name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-web:
    name: Build & Deploy Astro Site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        working-directory: web
        run: npm ci
      - name: Validate data
        working-directory: web
        run: node scripts/validate-data.mjs
      - name: Build
        working-directory: web
        run: npx astro build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web/dist --project-name=modelmarket --branch=main

  deploy-worker:
    name: Deploy Shortlink Worker
    runs-on: ubuntu-latest
    # 短链不常改，只在 worker/ 目录变更时才部署
    if: contains(github.event.head_commit.message, '[worker]') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - name: Install
        working-directory: worker
        run: npm ci
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
